<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 Arcana Magistra — Tarot de Marsella</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0612;color:#e8deff;font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}
.card{background:linear-gradient(135deg,#130d1e,#1e1430);border:1px solid #2d1f4e;border-radius:16px;padding:40px;text-align:center;max-width:400px;box-shadow:0 0 60px rgba(124,58,237,.3);}
.glyph{font-size:4rem;margin-bottom:16px;}
h1{color:#d4af37;font-size:1.4rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
p{color:#9b8ec4;font-size:.9rem;margin-bottom:24px;font-style:italic;}
.btn{display:inline-block;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;padding:14px 28px;border-radius:10px;text-decoration:none;font-weight:600;font-size:1rem;box-shadow:0 4px 15px rgba(124,58,237,.4);}
.spinner{width:40px;height:40px;border:3px solid rgba(212,175,55,.3);border-top-color:#d4af37;border-radius:50%;animation:spin 1s linear infinite;margin:20px auto;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
<div class="glyph">🔮</div>
<h1>Arcana Magistra</h1>
<p>Tarot de Marsella con Inteligencia Artificial</p>
<div class="spinner" id="sp"></div>
<p id="msg">Cargando tu app...</p>
<a href="https://codepen.io/pen?&prefill_data_id=9c35fb72-8f8b-49f0-9eca-0dc152fad6ce" class="btn" id="btn" style="display:none">🌟 Abrir Arcana Magistra</a>
</div>
<script>
setTimeout(function(){
  window.location.replace("https://codepen.io/pen?&prefill_data_id=9c35fb72-8f8b-49f0-9eca-0dc152fad6ce");
},1500);
setTimeout(function(){
  document.getElementById("sp").style.display="none";
  document.getElementById("msg").textContent="Haz click si no se redirige automaticamente:";
  document.getElementById("btn").style.display="inline-block";
},3000);
</script>
</body>
</html>
