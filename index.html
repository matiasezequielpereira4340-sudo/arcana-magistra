<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcana Magistra - Herramienta de Evaluación</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#d4af37;--purple:#7c3aed;--dark:#0a0612;--text:#e8deff;--muted:#9b8ec4;--green:#22c55e;--red:#ef4444}
body{background:var(--dark);color:var(--text);font-family:Georgia,serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{color:var(--gold);font-size:1.8rem;letter-spacing:3px;text-transform:uppercase;text-align:center;margin:20px 0 6px;text-shadow:0 0 20px rgba(212,175,55,.5)}
.subtitle{color:var(--muted);font-style:italic;text-align:center;margin-bottom:24px;font-size:.95rem}
.panel{width:100%;max-width:750px;background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.3);border-radius:14px;padding:24px;margin-bottom:22px}
.panel-title{color:var(--gold);font-size:1rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:18px;border-bottom:1px solid rgba(212,175,55,.2);padding-bottom:10px}
label{display:block;color:var(--muted);font-size:.85rem;margin-bottom:6px;margin-top:14px}
input[type=text],input[type=date],input[type=password],textarea,select{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(212,175,55,.3);color:var(--text);padding:10px 14px;border-radius:8px;font-family:Georgia,serif;font-size:.9rem;outline:none}
input[type=text]:focus,input[type=date]:focus,input[type=password]:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 8px rgba(212,175,55,.2)}
input[type=text]::placeholder,textarea::placeholder,input[type=password]::placeholder{color:var(--muted)}
textarea{resize:vertical;min-height:120px;line-height:1.6}
.btn{padding:12px 28px;border:none;border-radius:10px;cursor:pointer;font-family:Georgia,serif;font-size:.95rem;font-weight:700;transition:.3s;margin-top:16px}
.btn-gold{background:linear-gradient(135deg,var(--gold),#b8962f);color:#0a0612}
.btn-gold:hover{box-shadow:0 4px 20px rgba(212,175,55,.4);transform:translateY(-1px)}
.btn-gold:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-purple{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff}
.btn-purple:hover{box-shadow:0 4px 20px rgba(124,58,237,.4);transform:translateY(-1px)}
.numeros-box{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:16px 0}
.num-card{background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.25);border-radius:10px;padding:14px;text-align:center}
.num-card .num{font-size:2rem;color:var(--gold);font-weight:700}
.num-card .num-label{font-size:.75rem;color:var(--muted);margin-top:4px;letter-spacing:1px}
.cartas-container{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin:16px 0}
.carta-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.carta-pos{color:var(--muted);font-size:.7rem;text-align:center;letter-spacing:1px;text-transform:uppercase}
.carta{width:110px;height:220px;border-radius:10px;border:2px solid rgba(212,175,55,.4);background:linear-gradient(135deg,#1a0f2e,#2d1f4e);display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 4px 16px rgba(0,0,0,.5);overflow:hidden}
.carta img{width:100%;height:100%;object-fit:cover;display:block}
.carta.invertida{transform:rotate(180deg)}
.carta-nombre{font-size:.72rem;color:var(--gold);text-align:center;max-width:100px;line-height:1.3}
.badge-inv{position:absolute;bottom:4px;right:4px;background:rgba(220,38,38,.85);color:#fff;font-size:.55rem;padding:2px 5px;border-radius:3px;z-index:2}.carta.invertida .badge-inv{transform:rotate(180deg)}
.spread-selector{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.spread-btn{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.4);color:var(--text);padding:8px 16px;border-radius:8px;cursor:pointer;font-family:Georgia,serif;font-size:.85rem;transition:.3s}
.spread-btn.active,.spread-btn:hover{background:linear-gradient(135deg,#7c3aed,#a855f7);border-color:#7c3aed}
.evaluacion{background:linear-gradient(135deg,#130d1e,#1e1430);border:1px solid rgba(212,175,55,.25);border-radius:14px;padding:24px;margin-top:8px}
.evaluacion h3{color:var(--gold);font-size:1rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;text-align:center}
.puntaje{font-size:2.5rem;color:var(--gold);font-weight:700;text-align:center;margin:10px 0}
.evaluacion p{color:var(--text);line-height:1.8;font-size:.9rem;white-space:pre-wrap}
.spinner-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;margin:20px 0}
.spinner{width:40px;height:40px;border:3px solid rgba(212,175,55,.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-wrap p{color:var(--muted);font-style:italic;font-size:.9rem}
.error-msg{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.4);color:#fca5a5;padding:14px;border-radius:10px;margin:14px 0;text-align:center;font-size:.9rem}
.seccion-bloqueada{opacity:.35;pointer-events:none}
.paso-badge{display:inline-block;background:rgba(124,58,237,.3);border:1px solid #7c3aed;color:#a78bfa;border-radius:20px;padding:3px 12px;font-size:.75rem;margin-bottom:10px;letter-spacing:1px}
.veronica-btn{position:fixed;bottom:20px;right:20px;background:rgba(124,58,237,.3);border:1px solid rgba(124,58,237,.5);color:var(--muted);padding:8px 14px;border-radius:20px;cursor:pointer;font-size:.75rem;font-family:Georgia,serif;transition:.3s;z-index:100}
.veronica-btn:hover{background:rgba(124,58,237,.5);color:var(--text)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:200;display:none}
.modal-overlay.show{display:flex}
.modal{background:#13091f;border:1px solid rgba(212,175,55,.3);border-radius:16px;padding:28px;width:90%;max-width:500px}
.modal h2{color:var(--gold);margin-bottom:18px;text-align:center}
.resultado-alumno{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.3);border-radius:12px;padding:16px;margin-bottom:12px}
.resultado-alumno h4{color:var(--gold);margin-bottom:8px}
.resultado-alumno .meta{color:var(--muted);font-size:.8rem;margin-bottom:8px}
footer{color:var(--muted);font-size:.75rem;text-align:center;margin-top:30px;opacity:.6;padding-bottom:20px}
.aviso{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.35);padding:12px 14px;border-radius:10px;font-size:.84rem;line-height:1.5;color:#f5c2c7;margin-bottom:18px;max-width:750px}
small.code{font-family:monospace;color:#ddd}
</style>
</head>
<body>
<h1>🔮 Arcana Magistra</h1>
<p class="subtitle">Herramienta de Evaluación — Método Verónica Otero</p>


<div class="panel" id="paso1">
<span class="paso-badge">PASO 1</span>
<div class="panel-title">Datos del Alumno</div>
<label>Nombre completo</label>
<input type="text" id="alumnoNombre" placeholder="Nombre y apellido">
<label>Fecha de nacimiento</label>
<input type="date" id="alumnoFecha">
<button class="btn btn-gold" onclick="iniciarPractica()">Comenzar práctica</button>
</div>

<div class="panel seccion-bloqueada" id="paso2">
<span class="paso-badge">PASO 2</span>
<div class="panel-title">Numerología</div>
<div class="numeros-box" id="numerosBox"></div>
<label>Tu interpretación numerológica</label>
<textarea id="interpNumerologia" placeholder="Escribe tu interpretación..."></textarea>
<button class="btn btn-gold" onclick="evaluarNumerologia()">Enviar interpretación para evaluación</button>
<div id="evalNumerologia"></div>
</div>

<div class="panel seccion-bloqueada" id="paso3">
<span class="paso-badge">PASO 3</span>
<div class="panel-title">Tirada de Cartas</div>
<label>Tipo de tirada</label>
<div class="spread-selector">
<button class="spread-btn active" data-spread="1" onclick="selSpread(this)">1 carta</button>
<button class="spread-btn" data-spread="3" onclick="selSpread(this)">3 cartas</button>
<button class="spread-btn" data-spread="4" onclick="selSpread(this)">4 cartas</button>
</div>
<button class="btn btn-purple" onclick="tirarCartas()">Tirar cartas</button>
<div class="cartas-container" id="cartasContainer"></div>
<div id="cartasInfo" style="display:none">
<label>Tu interpretación y combinaciones (Concreto + Clásico + Unión)</label>
<textarea id="interpCartas" placeholder="Describe el significado de cada carta y las combinaciones que ves..."></textarea>
<button class="btn btn-gold" onclick="evaluarCartas()">Enviar interpretación para evaluación</button>
</div>
<div id="evalCartas"></div>
</div>

<footer>Arcana Magistra — Método Verónica Otero — Solo para uso educativo</footer>

<button class="veronica-btn" onclick="abrirVeronica()">🔑 Profesora</button>

<div class="modal-overlay" id="veronicaModal">
  <div class="modal">
    <h2>🔑 Acceso Profesora</h2>
    <div id="loginVeronica">
      <label>Contraseña</label>
      <input type="password" id="veronicaPass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')loginVeronica()">
      <button class="btn btn-gold" onclick="loginVeronica()">Ingresar</button>
      <p style="margin-top:12px"><a href="#" onclick="cerrarModal()" style="color:var(--muted);font-size:.85rem">Cancelar</a></p>
    </div>
    <div id="panelVeronica" style="display:none">
      <h3 style="color:var(--gold);margin-bottom:14px">Resultados de Alumnos</h3>
      <div id="listaResultados"></div>
      <button class="btn btn-purple" onclick="cerrarModal()" style="margin-top:14px">Cerrar</button>
    </div>
  </div>
</div>

function obtenerCombinacionesMayorMenor(cartas){
  const mayores = cartas.filter(c => c.palo === 'Mayores');
  const menores = cartas.filter(c => c.palo !== 'Mayores');
  const referencias = [];
  mayores.forEach(mayor => {
    menores.forEach(menor => {
      const texto = COMBINACIONES_MAYOR_MENOR[mayor.n]?.[menor.n];
      if(texto){
        referencias.push({
          clave: `${mayor.n} + ${menor.n}`,
          texto,
          invertida: Boolean(mayor.inv || menor.inv)
        });
      }
    });
  });
  return referencias;
}

const POS = {
  1:['Tu carta'],
  3:['Pasado','Presente','Futuro'],
  4:['Situación actual','Desafío','Pasado','Resultado']
};

let alumnoActual = null;
let cartasActuales = [];
let spreadActual = 1;

function reducir(n){
  while(n > 22 && n !== 11 && n !== 22){
    let s = 0;
    String(n).split('').forEach(d => s += parseInt(d,10));
    n = s;
  }
  return n;
}

function numLetra(c){
  const m = {a:1,b:2,c:3,d:4,e:5,f:6,g:7,h:8,i:9,j:1,k:2,l:3,m:4,n:5,o:6,p:7,q:8,r:9,s:1,t:2,u:3,v:4,w:5,x:6,y:7,z:8};
  return m[c.toLowerCase()] || 0;
}

function calcNumerologia(nombre, fecha){
  const letras = nombre.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ]/g,'').split('');
  const sumaNombre = letras.reduce((a,c) => a + numLetra(c.normalize("NFD").replace(/[^a-zA-Z]/g,'')), 0);
  const destino = reducir(sumaNombre);
  const partes = fecha.split('-');
  const d = parseInt(partes[2],10), m = parseInt(partes[1],10), y = parseInt(partes[0],10);
  const sumaAnio = String(y).split('').reduce((a,c) => a + parseInt(c,10), 0);
  const camino = reducir(d + m + sumaAnio);
  const vocales = 'aeiou';
  const ascii = letras.map(c => c.normalize("NFD").replace(/[^a-zA-Z]/g,'').toLowerCase());
  const sumaVoc = ascii.filter(c => vocales.includes(c)).reduce((a,c) => a + numLetra(c), 0);
  const alma = reducir(sumaVoc || 1);
  const sumaCons = ascii.filter(c => c && !vocales.includes(c)).reduce((a,c) => a + numLetra(c), 0);
  const personalidad = reducir(sumaCons || 1);
  return {camino, destino, alma, personalidad};
}

function iniciarPractica(){
  const nombre = document.getElementById('alumnoNombre').value.trim();
  const fecha = document.getElementById('alumnoFecha').value;
  if(!nombre || !fecha){ alert('Completa nombre y fecha de nacimiento.'); return; }
  alumnoActual = { nombre, fecha, nums: calcNumerologia(nombre, fecha), ts: new Date().toLocaleString('es-AR') };
  document.querySelector('#paso1 button').disabled = true;
  document.getElementById('paso2').classList.remove('seccion-bloqueada');
  const n = alumnoActual.nums;
  document.getElementById('numerosBox').innerHTML =
    cardNum(n.camino,'Camino de Vida') +
    cardNum(n.destino,'Destino') +
    cardNum(n.alma,'Deseo del Alma') +
    cardNum(n.personalidad,'Personalidad');
}

function cardNum(n,l){
  return `<div class="num-card"><div class="num">${n}</div><div class="num-label">${l}</div></div>`;
}

function selSpread(btn){
  document.querySelectorAll('.spread-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  spreadActual = parseInt(btn.dataset.spread,10);
  document.getElementById('cartasContainer').innerHTML = '';
  document.getElementById('cartasInfo').style.display = 'none';
  document.getElementById('evalCartas').innerHTML = '';
}

function mezclar(a){
  const r = [...a];
  for(let i = r.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [r[i], r[j]] = [r[j], r[i]];
  }
  return r;
}

function tirarCartas(){
  cartasActuales = mezclar(AM).slice(0, spreadActual).map(c => ({...c, inv: Math.random() < 0.3}));
  const con = document.getElementById('cartasContainer');
  const pos = POS[spreadActual];
  con.innerHTML = '';
  cartasActuales.forEach((c,i) => {
    const w = document.createElement('div');
    w.className = 'carta-wrap';
    w.innerHTML = `
      <div class="carta-pos">${pos[i]}</div>
      <div class="carta${c.inv ? ' invertida' : ''}">
        <img src="${getRutaCarta(c)}" alt="${c.n}" loading="lazy" onerror="this.style.display='none';this.parentNode.style.display='flex';this.parentNode.style.flexDirection='column';this.parentNode.style.alignItems='center';this.parentNode.style.justifyContent='center';this.parentNode.innerHTML='<span style=\'color:#d4af37;font-size:0.85rem;text-align:center;padding:12px;font-style:italic\'>' + this.alt + '</span>';">
        ${c.inv ? '<span class="badge-inv">INV</span>' : ''}
      </div>
      <div class="carta-nombre">${c.n}${c.inv ? ' (Inv.)' : ''}</div>
    `;
    con.appendChild(w);
  });
  document.getElementById('cartasInfo').style.display = 'block';
  document.getElementById('evalCartas').innerHTML = '';
  document.getElementById('interpCartas').value = '';
}

      'x-api-key': AK,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json',
      'anthropic-dangerous-direct-browser-calls': 'true'
    },
    body: JSON.stringify({
      model:'claude-opus-4-5',
      max_tokens:1500,
      messages:[{role:'user', content: prompt}]
    })
  });
  if(!res.ok){
    let e = {};
    try { e = await res.json(); } catch(_){
    }
    throw new Error(e.error?.message || ('Error ' + res.status));
  }
  const d = await res.json();
  return d.content?.[0]?.text || 'Sin respuesta.';
}

async function evaluarNumerologia(){
  const interp = document.getElementById('interpNumerologia').value.trim();
  if(!interp){ alert('Escribe tu interpretación antes de enviar.'); return; }
  const btns = document.querySelectorAll('#paso2 button');
  btns.forEach(b => b.disabled = true);
  const div = document.getElementById('evalNumerologia');
  div.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div><p>Verónica está evaluando...</p></div>';
  const n = alumnoActual.nums;
  const prompt = `Eres Verónica Otero, profesora de Tarot de Marsella y numerología. Evalúa la interpretación numerológica de tu alumno.
Alumno: ${alumnoActual.nombre}.
Números calculados:
- Camino de Vida: ${n.camino}
- Destino: ${n.destino}
- Deseo del Alma: ${n.alma}
- Personalidad: ${n.personalidad}

Interpretación del alumno:
"${interp}"

Evalúa de manera docente y constructiva. Puntúa del 1 al 10. Señala aciertos, errores y explica los significados correctos.
Comienza con: PUNTUACION: X/10`;
  try {
    const resp = await llamarIA(prompt);
    const match = resp.match(/PUNTUACION[:\s]+(\d+)/i);
    const puntaje = match ? match[1] : '?';
    div.innerHTML = `<div class="evaluacion"><h3>Evaluación de Verónica</h3><div class="puntaje">${puntaje}/10</div><p>${resp.replace(/</g,'&lt;')}</p></div>`;
    alumnoActual.evalNumerologia = { puntaje, texto: resp, interpAlumno: interp };
    document.getElementById('paso3').classList.remove('seccion-bloqueada');
  } catch(e) {
    div.innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;
  } finally {
    btns.forEach(b => b.disabled = false);
  }
}


async function evaluarCartas(){
  const interp = document.getElementById('interpCartas').value.trim();
  if(!interp){ alert('Escribe tu interpretación antes de enviar.'); return; }
  const btn = document.querySelector('#paso3 .btn-gold');
  btn.disabled = true;
  const div = document.getElementById('evalCartas');
  div.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div><p>Verónica está evaluando tu lectura...</p></div>';
  const pos = POS[spreadActual];
  const descCartas = cartasActuales.map((c,i) =>
    `${pos[i]}: ${c.n}${c.inv ? ' (invertida)' : ' (derecha)'} — Concreto: ${c.concreto} | Clásico: ${c.clasico} | Unión: ${c.union}`
  ).join('\n');
  const refs = obtenerCombinacionesMayorMenor(cartasActuales);
  const refsTexto = refs.length
    ? refs.map(r => `- ${r.clave}${r.invertida ? ' [hay carta invertida: tomar esta combinación como base y ajustar el matiz sin contradecirla]' : ''}: ${r.texto}`).join('\n')
    : 'No hay combinación mayor + menor directa del manual en esta tirada.';
  const prompt = `Eres Verónica Otero, profesora de Tarot de Marsella con sistema Concreto + Clásico + Unión.

Cartas obtenidas:
${descCartas}

Combinaciones del manual (referencia prioritaria cuando aparezca un Arcano Mayor con un Arcano Menor):
${refsTexto}

Interpretación del alumno:
"${interp}"

Instrucciones de evaluación:
- Evalúa si usó correctamente los tres niveles: Concreto, Clásico y Unión.
- Evalúa si detectó bien las combinaciones entre cartas.
- Si existe una combinación del manual, úsala como referencia principal y corrige contra eso, no improvises otra lectura distinta.
- Si hay cartas invertidas, podés ajustar el matiz, pero sin contradecir el núcleo de la combinación del manual.
- Puntúa del 1 al 10.
- Señala aciertos, errores y muestra la lectura correcta esperable.
- Si hubo combinación del manual y el alumno no la vio, decilo de forma explícita.
Comienza con: PUNTUACION: X/10`;
  try {
    const resp = await llamarIA(prompt);
    const match = resp.match(/PUNTUACION[:\s]+(\d+)/i);
    const puntaje = match ? match[1] : '?';
    const referenciasHTML = refs.length ? `<div style="margin:12px 0 0;color:var(--muted);font-size:.82rem;line-height:1.5"><strong style="color:var(--gold)">Combinaciones del manual usadas:</strong><br>${refs.map(r => `${r.clave}: ${r.texto}`).join('<br><br>')}</div>` : '';
    div.innerHTML = `<div class="evaluacion"><h3>Evaluación de Verónica</h3><div class="puntaje">${puntaje}/10</div><p>${resp.replace(/</g,'&lt;')}</p>${referenciasHTML}</div>`;
    alumnoActual.evalCartas = {
      puntaje,
      texto: resp,
      interpAlumno: interp,
      cartas: cartasActuales.map(c => c.n + (c.inv ? ' (Inv.)' : '')),
      combinacionesManual: refs.map(r => `${r.clave}: ${r.texto}`)
    };
    guardarResultado();
  } catch(e) {
    div.innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
  }
}

function guardarResultado(){
  try {
    const key = 'arcana_resultados';
    let lista = JSON.parse(localStorage.getItem(key) || '[]');
    lista = lista.filter(r => !(r.nombre === alumnoActual.nombre && r.ts === alumnoActual.ts));
    lista.unshift(alumnoActual);
    if(lista.length > 300) lista = lista.slice(0,300);
    localStorage.setItem(key, JSON.stringify(lista));
  } catch(e) {
    console.warn('No se pudo guardar:', e);
  }
}

function abrirVeronica(){ document.getElementById('veronicaModal').classList.add('show'); }
function cerrarModal(){
  document.getElementById('veronicaModal').classList.remove('show');
  document.getElementById('loginVeronica').style.display='block';
  document.getElementById('panelVeronica').style.display='none';
  document.getElementById('veronicaPass').value='';
}

function loginVeronica(){
  if(document.getElementById('veronicaPass').value === PASS_VERONICA){
    document.getElementById('loginVeronica').style.display='none';
    document.getElementById('panelVeronica').style.display='block';
    mostrarResultados();
  } else {
    alert('Contraseña incorrecta.');
    document.getElementById('veronicaPass').value = '';
  }
}

function mostrarResultados(){
  const lista = JSON.parse(localStorage.getItem('arcana_resultados') || '[]');
  const div = document.getElementById('listaResultados');
  if(!lista.length){
    div.innerHTML = '<p style="color:var(--muted);text-align:center">Todavía no hay resultados guardados.</p>';
    return;
  }
  div.style.maxHeight = '400px';
  div.style.overflowY = 'auto';
  div.innerHTML = lista.map(r => {
    const pN = r.evalNumerologia ? `Numerología: <strong>${r.evalNumerologia.puntaje}/10</strong>` : '';
    const pC = r.evalCartas ? `Tirada: <strong>${r.evalCartas.puntaje}/10</strong>` : '';
    const cartas = r.evalCartas ? r.evalCartas.cartas.join(' | ') : '';
    return `<div class="resultado-alumno">
      <h4>${r.nombre}</h4>
      <div class="meta">${r.ts}</div>
      <div style="display:flex;gap:16px;margin:6px 0;flex-wrap:wrap">${pN} ${pC}</div>
      ${cartas ? `<div style="color:var(--muted);font-size:.78rem;margin-top:4px">Cartas: ${cartas}</div>` : ''}
    </div>`;
  }).join('');
}
